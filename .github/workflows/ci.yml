name: CI

on:
  push:
    branches:
      - 'main'
      - 'v*-dev'
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - 'main'
      - 'v*-dev'
  workflow_dispatch:
    inputs:
      version:
        description: 'Specify version name (e.g. latest, v1.0.0)'
        required: true
        default: 'latest'

env:
  NODE_VERSION: '21'

jobs:
  deps:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.3.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: 'pnpm'
      - name: Deps
        run: scripts/deps
        env:
          LOCK: true
      - name: Archive Modules
        timeout-minutes: 5
        uses: actions/cache/save@v4
        with:
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          path: |
            ${{ github.workspace }}/node_modules

  build:
    needs:
      - deps
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Unarchive Node Modules
        timeout-minutes: 5
        uses: actions/cache/restore@v4
        with:
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          path: |
            ${{ github.workspace }}/node_modules
      - name: Build
        run: scripts/build

  build-publish:
    needs:
      - deps
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Unarchive Node Modules
        timeout-minutes: 5
        uses: actions/cache/restore@v4
        with:
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          path: |
            ${{ github.workspace }}/node_modules
      - name: Build
        run: scripts/build
      - name: Determine Version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/v*-dev ]]; then
            echo "version=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          else
            echo "Not a publish target"
            exit 1
          fi
      - name: Package
        run: scripts/package
        env:
          VERSION: '${{ github.event.inputs.version || github.ref_name }}'
      - name: Copy to latest
        run: |
          if [ "${{ github.event.inputs.version || github.ref_name }}" != "latest" ]; then
            cp dist/${{ github.event.inputs.version || github.ref_name }}.tar.gz dist/latest.tar.gz
          fi
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ github.event.inputs.version || github.ref_name }}.tar.gz
            dist/latest.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
